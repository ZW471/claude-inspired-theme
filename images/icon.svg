<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF9F5"/>
      <stop offset="100%" style="stop-color:#F0EEE6"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="256" height="256" rx="48" ry="48" fill="url(#bg)"/>
  <!-- Border -->
  <rect width="256" height="256" rx="48" ry="48" fill="none" stroke="#E8E6DC" stroke-width="2"/>
  <!-- Stylized "C" in terracotta -->
  <text x="128" y="175" font-family="Georgia, serif" font-size="180" font-weight="bold" fill="#D97757" text-anchor="middle">C</text>
  <!-- Small code bracket accents -->
  <text x="48" y="80" font-family="monospace" font-size="36" fill="#6A9BCC" text-anchor="middle">{</text>
  <text x="208" y="80" font-family="monospace" font-size="36" fill="#8A46CE" text-anchor="middle">}</text>
  <!-- Bottom accent line -->
  <rect x="78" y="210" width="100" height="4" rx="2" fill="#D97757" opacity="0.6"/>
</svg>
